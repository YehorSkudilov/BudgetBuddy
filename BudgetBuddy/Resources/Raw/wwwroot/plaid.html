<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Plaid</title>
    <script src="_framework/hybridwebview.js"></script>
    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
</head>
<body>
    <script>
        function sendToMAUI(type, payload) {
            window.HybridWebView.SendRawMessage(JSON.stringify({ type, ...payload }));
        }

        window.onerror = function (msg, _url, line, col) {
            sendToMAUI("exit", { error: msg, line, col });
        };

        function startPlaid(linkToken) {
            try {
                if (!window.Plaid) throw new Error("Plaid SDK not loaded");

                Plaid.create({
                    token: linkToken,
                    onSuccess: (public_token) => sendToMAUI("success", { public_token }),
                    onExit: (err, metadata) => sendToMAUI("exit", { err, metadata })
                }).open();

            } catch (ex) {
                sendToMAUI("exit", { error: ex.message });
            }
        }

        // Poll until Plaid SDK is ready, then tell C# we're good
        window.addEventListener("load", function () {
            let attempts = 0;
            const t = setInterval(() => {
                attempts++;
                if (window.HybridWebView && window.Plaid?.create) {
                    clearInterval(t);
                    window.HybridWebView.SendRawMessage(JSON.stringify({ type: "ready" }));
                }
                if (attempts > 100) clearInterval(t); // 5s timeout
            }, 50);
        });
    </script>
</body>
</html>
