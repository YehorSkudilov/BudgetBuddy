<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Plaid</title>
    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
</head>
<body>
    <script>
        // -----------------------------
        // SIGNAL MAUI (without navigating away)
        // Uses hidden iframe so the page stays alive
        // -----------------------------
        function signalMAUI(url) {
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = url;
            document.body.appendChild(iframe);
            setTimeout(() => iframe.remove(), 1000);
        }

        // -----------------------------
        // GLOBAL ERROR HANDLER
        // -----------------------------
        window.onerror = function (msg, url, line, col, error) {
            try {
                signalMAUI("maui://plaid-exit?data=" +
                    encodeURIComponent(JSON.stringify({
                        error: msg,
                        line: line,
                        col: col
                    })));
            } catch { }
        };

        // -----------------------------
        // START PLAID (called from MAUI)
        // -----------------------------
        function startPlaid(linkToken) {
            try {
                if (!window.Plaid) {
                    throw new Error("Plaid SDK not loaded");
                }

                const handler = Plaid.create({
                    token: linkToken,

                    onSuccess: function (public_token, metadata) {
                        signalMAUI("maui://plaid-success?data=" +
                            encodeURIComponent(JSON.stringify({
                                public_token: public_token
                            })));
                    },

                    onExit: function (err, metadata) {
                        signalMAUI("maui://plaid-exit?data=" +
                            encodeURIComponent(JSON.stringify({
                                err: err,
                                metadata: metadata
                            })));
                    }
                });

                handler.open();
            } catch (ex) {
                signalMAUI("maui://plaid-exit?data=" +
                    encodeURIComponent(JSON.stringify({
                        error: ex.message
                    })));
            }
        }

        // -----------------------------
        // SIGNAL MAUI WHEN READY
        // Exposes window._plaidReady for fallback polling from C#
        // -----------------------------
        window._plaidReady = false;

        window.addEventListener("load", function () {
            const waitForPlaid = setInterval(() => {
                if (window.Plaid && window.Plaid.create) {
                    clearInterval(waitForPlaid);
                    window._plaidReady = true;
                    signalMAUI("maui://plaid-ready");
                }
            }, 50);
        });
    </script>
</body>
</html>
