name: Publish

env:
  PRODUCT_NAME: BudgetBuddy
  PROJECT_PATH: BudgetBuddy/BudgetBuddy.csproj

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump"
        required: true
        default: x.x.1
        type: choice
        options:
          - none
          - x.x.1
          - x.1.0
          - 1.0.0

# ==================================================
# VERSION BUMP
# ==================================================
jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.version }}
      version_code: ${{ steps.bump.outputs.version_code }}
      bumped: ${{ steps.bump.outputs.bumped }}

    steps:
      - uses: actions/checkout@v4

      - name: Bump MAUI version
        id: bump
        run: |
          FILE="${{ env.PROJECT_PATH }}"

          # Read current display version
          CURRENT=$(grep -oPm1 "(?<=<ApplicationDisplayVersion>)[^<]+" "$FILE")

          # Normalize version (1.0 -> 1.0.0)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=${PATCH:-0}

          MODE="${{ github.event.inputs.version_bump }}"
          BUMPED=false

          case "$MODE" in
            x.x.1)
              PATCH=$((PATCH + 1))
              BUMPED=true
              ;;
            x.1.0)
              MINOR=$((MINOR + 1))
              PATCH=0
              BUMPED=true
              ;;
            1.0.0)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              BUMPED=true
              ;;
            none)
              ;;
            *)
              echo "Invalid version bump"
              exit 1
              ;;
          esac

          NEW="$MAJOR.$MINOR.$PATCH"

          # Android versionCode (must be int and increasing)
          VERSION_CODE=$((MAJOR * 1000000 + MINOR * 1000 + PATCH))

          if [ "$BUMPED" = true ]; then
            echo "Bumping to $NEW ($VERSION_CODE)"

            sed -i "s|<ApplicationDisplayVersion>.*</ApplicationDisplayVersion>|<ApplicationDisplayVersion>$NEW</ApplicationDisplayVersion>|" "$FILE"
            sed -i "s|<ApplicationVersion>.*</ApplicationVersion>|<ApplicationVersion>$VERSION_CODE</ApplicationVersion>|" "$FILE"
          fi

          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "bumped=$BUMPED" >> $GITHUB_OUTPUT

      - name: Commit version bump
        if: steps.bump.outputs.bumped == 'true'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add ${{ env.PROJECT_PATH }}
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} (${{ steps.bump.outputs.version_code }})"
          git push

# ==================================================
# BUILD ANDROID
# ==================================================
  build:
    needs: version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      # Install .NET 10
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Install MAUI
      - name: Install MAUI workload
        run: dotnet workload install maui

      # Decode keystore
      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      # Publish AAB
      - name: Publish Android
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            -c Release \
            -f net10.0-android \
            /p:AndroidPackageFormat=aab \
            /p:AndroidKeyStore=true \
            /p:AndroidSigningKeyStore=keystore.jks \
            /p:AndroidSigningKeyAlias=${{ secrets.ANDROID_KEYALIAS_NAME }} \
            /p:AndroidSigningKeyPass=${{ secrets.ANDROID_KEYALIAS_PASS }} \
            /p:AndroidSigningStorePass=${{ secrets.ANDROID_KEYSTORE_PASS }}

      # Find output
      - name: Locate AAB
        id: find_aab
        run: |
          FILE=$(find . -name "*.aab" | head -n 1)
          echo "Found AAB: $FILE"
          echo "file=$FILE" >> $GITHUB_OUTPUT

      # Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: ${{ steps.find_aab.outputs.file }}

      # Upload to Google Play
      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.companyname.budgetbuddy
          releaseFiles: ${{ steps.find_aab.outputs.file }}
          track: alpha
          status: completed

# ==================================================
# RELEASE
# ==================================================
  release:
    needs: [version, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.new_version }}
          name: Release v${{ needs.version.outputs.new_version }}
          generate_release_notes: true
          files: dist/**/*.aab
