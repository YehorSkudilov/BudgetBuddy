name: Publish

permissions:
  contents: write

env:
  PROJECT_PATH: BudgetBuddy/BudgetBuddy.csproj
  KEYSTORE_PATH: BudgetBuddy\Publish\Android\keystore\budgetbuddy.keystore

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump"
        required: true
        default: x.x.1
        type: choice
        options:
          - none
          - x.x.1
          - x.1.0
          - 1.0.0

# ==================================================
# VERSION BUMP
# ==================================================
jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.version }}
      version_code: ${{ steps.bump.outputs.version_code }}
      bumped: ${{ steps.bump.outputs.bumped }}

    steps:
      - uses: actions/checkout@v4

      - name: Bump MAUI version
        id: bump
        run: |
          FILE="${{ env.PROJECT_PATH }}"

          CURRENT=$(grep -oPm1 "(?<=<ApplicationDisplayVersion>)[^<]+" "$FILE")

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=${PATCH:-0}

          MODE="${{ github.event.inputs.version_bump }}"
          BUMPED=false

          case "$MODE" in
            x.x.1) PATCH=$((PATCH + 1)); BUMPED=true ;;
            x.1.0) MINOR=$((MINOR + 1)); PATCH=0; BUMPED=true ;;
            1.0.0) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0; BUMPED=true ;;
            none) ;;
            *) echo "Invalid version"; exit 1 ;;
          esac

          NEW="$MAJOR.$MINOR.$PATCH"
          VERSION_CODE=$((MAJOR * 1000000 + MINOR * 1000 + PATCH))

          if [ "$BUMPED" = true ]; then
            sed -i "s|<ApplicationDisplayVersion>.*</ApplicationDisplayVersion>|<ApplicationDisplayVersion>$NEW</ApplicationDisplayVersion>|" "$FILE"
            sed -i "s|<ApplicationVersion>.*</ApplicationVersion>|<ApplicationVersion>$VERSION_CODE</ApplicationVersion>|" "$FILE"
          fi

          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "bumped=$BUMPED" >> $GITHUB_OUTPUT

      - name: Commit version bump
        if: steps.bump.outputs.bumped == 'true'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add ${{ env.PROJECT_PATH }}
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git push

# ==================================================
# BUILD ANDROID
# ==================================================
  build:
    needs: version
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # =========================
      # .NET + MAUI
      # =========================
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui

      # =========================
      # BUILD + SIGNING
      # =========================
      - name: Publish Android
        shell: pwsh
        run: |
          $keystore = "${{ github.workspace }}\${{ env.KEYSTORE_PATH }}"

          if (!(Test-Path $keystore)) {
            Write-Host "Keystore folder contents:"
            Get-ChildItem "${{ github.workspace }}\BudgetBuddy\Publish\Android\keystore"
            throw "Keystore not found"
          }

          dotnet publish "${{ env.PROJECT_PATH }}" `
            -c Release `
            -f net10.0-android `
            /p:AndroidPackageFormat=aab `
            /p:AndroidKeyStore=true `
            "/p:AndroidSigningKeyStore=$keystore" `
            "/p:AndroidSigningKeyAlias=${{ secrets.ANDROID_KEYALIAS_NAME }}" `
            "/p:AndroidSigningKeyPass=${{ secrets.ANDROID_KEYALIAS_PASS }}" `
            "/p:AndroidSigningStorePass=${{ secrets.ANDROID_KEYSTORE_PASS }}"

      # =========================
      # FIND AAB (FIXED + SAFE)
      # =========================
      - name: Find AAB
        id: find_aab
        shell: pwsh
        run: |
          $file = Get-ChildItem -Recurse -Filter *.aab |
            Where-Object { $_.FullName -like "*Release*" -or $_.FullName -like "*net10.0-android*" } |
            Select-Object -First 1

          if ($null -eq $file) {
            $file = Get-ChildItem -Recurse -Filter *.aab | Select-Object -First 1
          }

          if ($null -eq $file) {
            Write-Host "No AAB found"
            Get-ChildItem -Recurse -Filter *.aab
            throw "AAB not found"
          }

          # IMPORTANT: convert Windows path to POSIX for Google Play action
          $posix = $file.FullName -replace "\\", "/"

          echo "file=$posix" >> $env:GITHUB_OUTPUT

      # =========================
      # UPLOAD ARTIFACT
      # =========================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: ${{ steps.find_aab.outputs.file }}

      # =============================
      # GOOGLE PLAY UPLOAD (FIXED)
      # =============================
      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.yehorskudilov.budgetbuddy
          releaseFiles: ${{ steps.find_aab.outputs.file }}
          track: alpha
          status: completed

# ==================================================
# RELEASE
# ==================================================
  release:
    needs: [version, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.new_version }}
          name: Release v${{ needs.version.outputs.new_version }}
          generate_release_notes: true
          files: dist/**/*.aab
